<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEON STRIKE 2040</title>
<style>
  html, body {
    margin: 0; padding: 0; overflow: hidden;
    background: #000;
    font-family: 'Courier New', monospace;
    height: 100%;
    cursor: default;
  }
  #game { display: block; background: #05010a; }

  #hud {
    position: fixed; top: 0; left: 0; width: 100%;
    display: flex; justify-content: space-between;
    padding: 14px 24px; box-sizing: border-box;
    color: #0ff; text-shadow: 0 0 8px #0ff, 0 0 16px #0ff;
    font-size: 18px; letter-spacing: 2px;
    pointer-events: none; z-index: 5;
  }
  #hud .lives { color: #f0f; text-shadow: 0 0 8px #f0f, 0 0 16px #f0f; }
  #hud .level { color: #ff0; text-shadow: 0 0 8px #ff0, 0 0 16px #ff0; }

  #bossbar {
    position: fixed; top: 46px; left: 50%; transform: translateX(-50%);
    width: 320px; height: 10px; border: 1px solid #f0f;
    box-shadow: 0 0 10px #f0f; display: none; z-index: 5;
  }
  #bossbar-fill {
    height: 100%; width: 100%; background: linear-gradient(90deg,#f0f,#0ff);
    box-shadow: 0 0 12px #f0f;
  }

  #overlay {
    position: fixed; inset: 0; display: flex; flex-direction: column;
    align-items: center; justify-content: center; text-align: center;
    background: rgba(2,0,8,0.82); z-index: 10; color: #0ff;
  }
  #overlay h1 {
    font-size: 52px; margin: 0 0 6px; letter-spacing: 6px;
    color: #0ff; text-shadow: 0 0 10px #0ff, 0 0 30px #0ff, 0 0 60px #f0f;
  }
  #overlay h2 {
    font-size: 20px; margin: 0 0 26px; letter-spacing: 3px;
    color: #f0f; text-shadow: 0 0 8px #f0f;
    font-weight: normal;
  }
  #overlay p { color: #9ff; font-size: 14px; line-height: 1.7; letter-spacing: 1px; margin: 4px 0; }
  #overlay .btn {
    margin-top: 22px; padding: 12px 30px; border: 2px solid #0ff;
    color: #0ff; background: transparent; font-family: inherit; font-size: 16px;
    letter-spacing: 3px; cursor: pointer; text-shadow: 0 0 6px #0ff;
    box-shadow: 0 0 12px #0ff inset, 0 0 12px #0ff;
  }
  #overlay .btn:hover { background: #0ff; color: #001; }
  #overlay .score { color: #ff0; text-shadow: 0 0 8px #ff0; font-size: 22px; margin-top: 10px; }
  #overlay.hidden { display: none; }
</style>
</head>
<body>
<canvas id="game"></canvas>

<div id="hud">
  <div>SCORE: <span id="score">0</span></div>
  <div class="level">NIVEL <span id="level">1</span></div>
  <div class="lives">VIDAS: <span id="lives">3</span></div>
</div>
<div id="bossbar"><div id="bossbar-fill"></div></div>

<div id="overlay">
  <h1>NEON STRIKE 2040</h1>
  <h2>// escuadrón geométrico contra el enjambre //</h2>
  <p>FLECHAS / WASD &mdash; mover &nbsp;&nbsp;|&nbsp;&nbsp; ESPACIO &mdash; disparar &nbsp;&nbsp;|&nbsp;&nbsp; P &mdash; pausa</p>
  <p>Destruí formaciones, recolectá power-ups, sobreviví a los jefes.</p>
  <div class="score" id="finalScore" style="display:none;"></div>
  <button class="btn" id="startBtn">INICIAR MISIÓN</button>
</div>

<script>
(function(){
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  let W, H;
  function resize(){ W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
  window.addEventListener('resize', resize);
  resize();

  const scoreEl = document.getElementById('score');
  const levelEl = document.getElementById('level');
  const livesEl = document.getElementById('lives');
  const overlay = document.getElementById('overlay');
  const startBtn = document.getElementById('startBtn');
  const finalScoreEl = document.getElementById('finalScore');
  const bossbar = document.getElementById('bossbar');
  const bossbarFill = document.getElementById('bossbar-fill');

  const keys = {};
  window.addEventListener('keydown', e => {
    keys[e.code] = true;
    if (e.code === 'Space') e.preventDefault();
    if (e.code === 'KeyP') paused = !paused;
  });
  window.addEventListener('keyup', e => keys[e.code] = false);

  let running = false, paused = false;
  let score = 0, level = 1, lives = 3;
  let frame = 0;
  let gridOffset = 0;
  let shake = 0;

  const NEON = ['#0ff', '#f0f', '#ff0', '#a0ff00', '#ff5500'];

  // ---------- Background ----------
  const stars = [];
  for (let i = 0; i < 140; i++) {
    stars.push({ x: Math.random()*2000, y: Math.random()*2000, s: Math.random()*2+0.4, sp: Math.random()*2+0.5 });
  }

  function drawBackground(dt) {
    ctx.fillStyle = '#05010a';
    ctx.fillRect(0, 0, W, H);

    // starfield
    ctx.save();
    for (const st of stars) {
      st.y += st.sp * dt * 60;
      if (st.y > H) { st.y = -2; st.x = Math.random() * W; }
      ctx.globalAlpha = 0.5 + st.s/3;
      ctx.fillStyle = '#66e6ff';
      ctx.fillRect(st.x % W, st.y, st.s, st.s);
    }
    ctx.restore();

    // synthwave grid floor (lower half)
    gridOffset += dt * 90;
    const horizon = H * 0.45;
    ctx.save();
    ctx.strokeStyle = 'rgba(255,0,255,0.35)';
    ctx.lineWidth = 1;
    const spacing = 46;
    const offset = gridOffset % spacing;
    for (let y = horizon + offset; y < H; y += spacing) {
      const t = (y - horizon) / (H - horizon);
      ctx.globalAlpha = 0.15 + t * 0.35;
      ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
    }
    ctx.globalAlpha = 0.25;
    const vlines = 14;
    for (let i = 0; i <= vlines; i++) {
      const xTop = W/2 + (i - vlines/2) * (W/vlines) * 0.25;
      const xBot = W/2 + (i - vlines/2) * (W/vlines) * 2.2;
      ctx.beginPath(); ctx.moveTo(xTop, horizon); ctx.lineTo(xBot, H); ctx.stroke();
    }
    ctx.restore();
  }

  // ---------- Entities ----------
  const player = {
    x: 0, y: 0, w: 30, h: 34, speed: 380,
    cooldown: 0, fireRate: 0.16, weaponLevel: 1,
    shieldTimer: 0, alive: true, blink: 0
  };
  function resetPlayer() {
    player.x = W/2; player.y = H - 110;
    player.cooldown = 0; player.weaponLevel = 1; player.shieldTimer = 2.5; player.alive = true;
  }

  let bullets = [];      // player bullets
  let enemyBullets = [];
  let enemies = [];
  let particles = [];
  let powerups = [];

  let boss = null;
  let bossScoreThreshold = 1200;
  let spawnTimer = 0;

  function rand(a, b) { return a + Math.random() * (b - a); }

  // shapes: 'tri' 'diamond' 'hex' 'square'
  function spawnEnemy(x, y, type, opts) {
    opts = opts || {};
    const base = {
      tri:    { hp: 1, size: 16, speed: 90,  score: 100, color: '#0ff' },
      diamond:{ hp: 2, size: 18, speed: 70,  score: 180, color: '#f0f' },
      square: { hp: 3, size: 20, speed: 55,  score: 260, color: '#ff0' },
      hex:    { hp: 5, size: 24, speed: 45,  score: 420, color: '#ff5500' }
    }[type];
    enemies.push(Object.assign({
      x, y, vx: 0, vy: base.speed, type, hp: base.hp, maxHp: base.hp,
      size: base.size, color: base.color, score: base.score,
      t: 0, phase: rand(0, Math.PI*2), shootCd: rand(1, 3)
    }, opts));
  }

  function spawnWave() {
    const pattern = Math.floor(Math.random() * 4);
    const diff = 1 + (level - 1) * 0.18;
    if (pattern === 0) { // horizontal line
      const n = 5 + Math.floor(level/2);
      for (let i = 0; i < n; i++) {
        spawnEnemy(60 + i * (W-120)/(n-1), -30 - i*10, 'tri', { vy: 90*diff, sine: true });
      }
    } else if (pattern === 1) { // V formation
      const n = 6;
      for (let i = 0; i < n; i++) {
        const off = Math.abs(i - n/2);
        spawnEnemy(W/2 + (i - n/2) * 50, -30 - off*40, 'diamond', { vy: 70*diff });
      }
    } else if (pattern === 2) { // zigzag squares
      const n = 5;
      for (let i = 0; i < n; i++) {
        spawnEnemy(80 + i * (W-160)/(n-1), -30, 'square', { vy: 55*diff, sine: true, phase: i });
      }
    } else { // heavy hex pair
      spawnEnemy(W*0.3, -40, 'hex', { vy: 45*diff });
      spawnEnemy(W*0.7, -40, 'hex', { vy: 45*diff });
    }
  }

  function spawnBoss() {
    boss = {
      x: W/2, y: -140, vx: 140, size: 70, hp: 60 + level*20, maxHp: 60 + level*20,
      t: 0, shootCd: 1, phase: 0, entering: true
    };
    bossbar.style.display = 'block';
  }

  function spawnPowerup(x, y) {
    if (Math.random() < 0.18) {
      powerups.push({ x, y, vy: 90, type: 'weapon', t: 0 });
    } else if (Math.random() < 0.10) {
      powerups.push({ x, y, vy: 90, type: 'shield', t: 0 });
    }
  }

  function explode(x, y, color, n, power) {
    n = n || 14;
    for (let i = 0; i < n; i++) {
      const a = Math.random() * Math.PI * 2;
      const sp = rand(60, 260) * (power||1);
      particles.push({
        x, y, vx: Math.cos(a)*sp, vy: Math.sin(a)*sp,
        life: rand(0.3, 0.7), maxLife: 0.7, color, size: rand(2,5)
      });
    }
    shake = Math.max(shake, 6 * (power||1));
  }

  function fireBullet(x, y, vx, vy, color, size, owner) {
    (owner==='enemy' ? enemyBullets : bullets).push({ x, y, vx, vy, color, size: size||4, owner });
  }

  function playerShoot() {
    const lvl = player.weaponLevel;
    const y = player.y - 18;
    fireBullet(player.x, y, 0, -640, '#0ff', 5, 'player');
    if (lvl >= 2) {
      fireBullet(player.x - 14, y+6, -60, -620, '#0ff', 4, 'player');
      fireBullet(player.x + 14, y+6, 60, -620, '#0ff', 4, 'player');
    }
    if (lvl >= 3) {
      fireBullet(player.x - 22, y+12, -120, -600, '#f0f', 4, 'player');
      fireBullet(player.x + 22, y+12, 120, -600, '#f0f', 4, 'player');
    }
  }

  function dist2(ax, ay, bx, by) { const dx=ax-bx, dy=ay-by; return dx*dx+dy*dy; }

  // ---------- Draw helpers ----------
  function glowPoly(points, color, fill) {
    ctx.save();
    ctx.shadowColor = color; ctx.shadowBlur = 16;
    ctx.strokeStyle = color; ctx.lineWidth = 2;
    if (fill) { ctx.fillStyle = color + '22'; }
    ctx.beginPath();
    points.forEach((p, i) => i===0 ? ctx.moveTo(p[0],p[1]) : ctx.lineTo(p[0],p[1]));
    ctx.closePath();
    if (fill) ctx.fill();
    ctx.stroke();
    ctx.restore();
  }

  function drawPlayer() {
    if (!player.alive) return;
    if (player.blink > 0 && Math.floor(player.blink*20)%2===0) return;
    const {x,y,w,h} = player;
    glowPoly([[x, y-h/2],[x-w/2, y+h/2],[x-w/5, y+h/4],[x+w/5, y+h/4],[x+w/2, y+h/2]], '#0ff', true);
    // engine flare
    const flareLen = 8 + Math.sin(frame*0.6)*4;
    glowPoly([[x-6,y+h/2],[x,y+h/2+flareLen],[x+6,y+h/2]], '#f0f', true);
    if (player.shieldTimer > 0) {
      ctx.save();
      ctx.shadowColor = '#0ff'; ctx.shadowBlur = 20;
      ctx.strokeStyle = 'rgba(0,255,255,0.7)'; ctx.lineWidth = 2;
      ctx.beginPath(); ctx.arc(x, y, 30, 0, Math.PI*2); ctx.stroke();
      ctx.restore();
    }
  }

  function drawEnemy(e) {
    const {x,y,size,color} = e;
    ctx.save();
    ctx.shadowColor = color; ctx.shadowBlur = 14;
    ctx.strokeStyle = color; ctx.lineWidth = 2;
    ctx.fillStyle = color + '22';
    ctx.beginPath();
    if (e.type === 'tri') {
      ctx.moveTo(x, y+size); ctx.lineTo(x-size, y-size); ctx.lineTo(x+size, y-size);
    } else if (e.type === 'diamond') {
      ctx.moveTo(x, y-size); ctx.lineTo(x+size, y); ctx.lineTo(x, y+size); ctx.lineTo(x-size, y);
    } else if (e.type === 'square') {
      const a = e.t*1.5;
      ctx.translate(x,y); ctx.rotate(a);
      ctx.rect(-size*0.7, -size*0.7, size*1.4, size*1.4);
      ctx.closePath(); ctx.fill(); ctx.stroke(); ctx.restore();
      return;
    } else if (e.type === 'hex') {
      for (let i=0;i<6;i++){ const ang=Math.PI/3*i - Math.PI/6; const px=x+Math.cos(ang)*size, py=y+Math.sin(ang)*size; i===0?ctx.moveTo(px,py):ctx.lineTo(px,py); }
    }
    ctx.closePath(); ctx.fill(); ctx.stroke();
    ctx.restore();

    if (e.maxHp > 1) {
      ctx.save();
      ctx.fillStyle = '#111';
      ctx.fillRect(x-size, y-size-10, size*2, 4);
      ctx.fillStyle = color;
      ctx.fillRect(x-size, y-size-10, size*2*(e.hp/e.maxHp), 4);
      ctx.restore();
    }
  }

  function drawBoss(b) {
    ctx.save();
    ctx.translate(b.x, b.y);
    ctx.rotate(b.t*0.3);
    ctx.shadowColor = '#f0f'; ctx.shadowBlur = 26;
    ctx.strokeStyle = '#f0f'; ctx.lineWidth = 3;
    ctx.fillStyle = 'rgba(255,0,255,0.12)';
    ctx.beginPath();
    for (let i=0;i<8;i++){ const ang=Math.PI/4*i; const r = i%2===0? b.size : b.size*0.6;
      const px=Math.cos(ang)*r, py=Math.sin(ang)*r; i===0?ctx.moveTo(px,py):ctx.lineTo(px,py); }
    ctx.closePath(); ctx.fill(); ctx.stroke();
    ctx.rotate(-b.t*0.6);
    ctx.strokeStyle = '#0ff'; ctx.shadowColor = '#0ff';
    ctx.beginPath(); ctx.arc(0,0,b.size*0.4,0,Math.PI*2); ctx.stroke();
    ctx.restore();
  }

  function drawBullet(bl) {
    ctx.save();
    ctx.shadowColor = bl.color; ctx.shadowBlur = 10;
    ctx.strokeStyle = bl.color; ctx.lineWidth = bl.size*0.6;
    ctx.beginPath();
    ctx.moveTo(bl.x, bl.y); ctx.lineTo(bl.x - bl.vx*0.02, bl.y - bl.vy*0.02);
    ctx.stroke();
    ctx.restore();
  }

  function drawParticle(p) {
    ctx.save();
    ctx.globalAlpha = Math.max(p.life / p.maxLife, 0);
    ctx.fillStyle = p.color; ctx.shadowColor = p.color; ctx.shadowBlur = 8;
    ctx.fillRect(p.x - p.size/2, p.y - p.size/2, p.size, p.size);
    ctx.restore();
  }

  function drawPowerup(p) {
    ctx.save();
    ctx.translate(p.x, p.y); ctx.rotate(p.t*3);
    const color = p.type === 'weapon' ? '#ff0' : '#0ff';
    ctx.shadowColor = color; ctx.shadowBlur = 16;
    ctx.strokeStyle = color; ctx.lineWidth = 2; ctx.fillStyle = color+'33';
    ctx.beginPath();
    for (let i=0;i<5;i++){ const ang=Math.PI*2/5*i - Math.PI/2; const r=10;
      const px=Math.cos(ang)*r, py=Math.sin(ang)*r; i===0?ctx.moveTo(px,py):ctx.lineTo(px,py); }
    ctx.closePath(); ctx.fill(); ctx.stroke();
    ctx.restore();
  }

  // ---------- Update ----------
  function update(dt) {
    frame++;
    if (player.shieldTimer > 0) player.shieldTimer -= dt;
    if (player.blink > 0) player.blink -= dt;

    // player movement
    let mx = 0, my = 0;
    if (keys['ArrowLeft'] || keys['KeyA']) mx -= 1;
    if (keys['ArrowRight'] || keys['KeyD']) mx += 1;
    if (keys['ArrowUp'] || keys['KeyW']) my -= 1;
    if (keys['ArrowDown'] || keys['KeyS']) my += 1;
    const len = Math.hypot(mx, my) || 1;
    player.x += (mx/len) * player.speed * dt;
    player.y += (my/len) * player.speed * dt;
    player.x = Math.max(20, Math.min(W-20, player.x));
    player.y = Math.max(H*0.35, Math.min(H-30, player.y));

    player.cooldown -= dt;
    if (keys['Space'] && player.cooldown <= 0 && player.alive) {
      playerShoot(); player.cooldown = player.fireRate;
    }

    // bullets
    bullets.forEach(b => { b.x += b.vx*dt; b.y += b.vy*dt; });
    bullets = bullets.filter(b => b.y > -20 && b.y < H+20 && b.x > -20 && b.x < W+20);
    enemyBullets.forEach(b => { b.x += b.vx*dt; b.y += b.vy*dt; });
    enemyBullets = enemyBullets.filter(b => b.y > -20 && b.y < H+20);

    // spawn logic
    if (!boss) {
      spawnTimer -= dt;
      if (spawnTimer <= 0) { spawnWave(); spawnTimer = Math.max(0.9, 2.3 - level*0.1); }
      if (score >= bossScoreThreshold) spawnBoss();
    }

    // enemies
    enemies.forEach(e => {
      e.t += dt;
      if (e.sine) e.x += Math.sin(e.t*2 + (e.phase||0)) * 60 * dt;
      e.y += e.vy * dt;
      e.shootCd -= dt;
      if (e.shootCd <= 0 && e.y > 0 && e.y < H*0.75) {
        const ang = Math.atan2(player.y - e.y, player.x - e.x);
        fireBullet(e.x, e.y, Math.cos(ang)*220, Math.sin(ang)*220, e.color, 4, 'enemy');
        e.shootCd = rand(1.6, 3.2);
      }
    });
    enemies = enemies.filter(e => e.y < H + 60 && e.hp > 0);

    // boss
    if (boss) {
      boss.t += dt;
      if (boss.entering) {
        boss.y += 60*dt;
        if (boss.y >= 120) boss.entering = false;
      } else {
        boss.x += boss.vx * dt;
        if (boss.x < 100 || boss.x > W-100) boss.vx *= -1;
        boss.shootCd -= dt;
        if (boss.shootCd <= 0) {
          for (let i=-2;i<=2;i++) {
            const ang = Math.PI/2 + i*0.28;
            fireBullet(boss.x, boss.y+boss.size*0.4, Math.cos(ang)*260, Math.sin(ang)*260, '#f0f', 5, 'enemy');
          }
          boss.shootCd = 1.1;
        }
      }
      bossbarFill.style.width = Math.max(0, boss.hp/boss.maxHp*100) + '%';
      if (boss.hp <= 0) {
        explode(boss.x, boss.y, '#f0f', 60, 3);
        score += 3000;
        boss = null;
        bossbar.style.display = 'none';
        bossScoreThreshold += 2500;
        level++;
      }
    }

    // powerups
    powerups.forEach(p => { p.t += dt; p.y += p.vy*dt; });
    powerups = powerups.filter(p => p.y < H+20);

    // particles
    particles.forEach(p => { p.x += p.vx*dt; p.y += p.vy*dt; p.vx *= 0.94; p.vy *= 0.94; p.life -= dt; });
    particles = particles.filter(p => p.life > 0);

    // collisions: player bullets vs enemies
    for (const b of bullets) {
      for (const e of enemies) {
        if (dist2(b.x,b.y,e.x,e.y) < (e.size+4)*(e.size+4)) {
          e.hp -= 1; b.hit = true;
          if (e.hp <= 0) { explode(e.x, e.y, e.color, 16); score += e.score; spawnPowerup(e.x, e.y); }
          break;
        }
      }
      if (!b.hit && boss) {
        if (dist2(b.x,b.y,boss.x,boss.y) < boss.size*boss.size) { boss.hp -= 1; b.hit = true; explode(b.x,b.y,'#0ff',4,0.4); }
      }
    }
    bullets = bullets.filter(b => !b.hit);
    enemies = enemies.filter(e => e.hp > 0 || explodeIfDead(e));

    function explodeIfDead(){ return false; }

    // enemy bullets vs player / enemies vs player
    if (player.alive) {
      for (const b of enemyBullets) {
        if (dist2(b.x,b.y,player.x,player.y) < 18*18) { b.hit = true; hitPlayer(); }
      }
      for (const e of enemies) {
        if (dist2(e.x,e.y,player.x,player.y) < (e.size+14)*(e.size+14)) { e.hp = 0; explode(e.x,e.y,e.color,10); hitPlayer(); }
      }
      if (boss && dist2(boss.x,boss.y,player.x,player.y) < (boss.size*0.5+16)*(boss.size*0.5+16)) hitPlayer();
      for (const p of powerups) {
        if (dist2(p.x,p.y,player.x,player.y) < 22*22) {
          p.hit = true;
          if (p.type === 'weapon') player.weaponLevel = Math.min(3, player.weaponLevel+1);
          else player.shieldTimer = 4;
        }
      }
    }
    enemyBullets = enemyBullets.filter(b => !b.hit);
    powerups = powerups.filter(p => !p.hit);
    enemies = enemies.filter(e => e.hp > 0);

    if (shake > 0) shake *= 0.9;

    // gradual difficulty
    if (frame % 600 === 0 && !boss) level++;

    scoreEl.textContent = score;
    levelEl.textContent = level;
    livesEl.textContent = lives;
  }

  function hitPlayer() {
    if (player.shieldTimer > 0 || player.blink > 0) return;
    lives--;
    explode(player.x, player.y, '#0ff', 20, 1.5);
    player.blink = 1.2;
    player.shieldTimer = 1.2;
    if (lives <= 0) { player.alive = false; endGame(); }
  }

  // ---------- Render ----------
  function render(dt) {
    ctx.save();
    if (shake > 0.3) {
      ctx.translate(rand(-shake,shake), rand(-shake,shake));
    }
    drawBackground(dt);
    enemies.forEach(drawEnemy);
    if (boss) drawBoss(boss);
    powerups.forEach(drawPowerup);
    bullets.forEach(drawBullet);
    enemyBullets.forEach(drawBullet);
    particles.forEach(drawParticle);
    drawPlayer();
    ctx.restore();
  }

  // ---------- Main loop ----------
  let lastTime = 0;
  function loop(ts) {
    if (!running) return;
    const dt = Math.min((ts - lastTime) / 1000 || 0, 0.05);
    lastTime = ts;
    if (!paused) update(dt);
    render(dt);
    requestAnimationFrame(loop);
  }

  function startGame() {
    score = 0; level = 1; lives = 3; frame = 0;
    bullets = []; enemyBullets = []; enemies = []; particles = []; powerups = [];
    boss = null; bossScoreThreshold = 1200; spawnTimer = 0.5;
    bossbar.style.display = 'none';
    resetPlayer();
    overlay.classList.add('hidden');
    finalScoreEl.style.display = 'none';
    running = true; paused = false;
    lastTime = performance.now();
    requestAnimationFrame(loop);
  }

  function endGame() {
    running = false;
    setTimeout(() => {
      overlay.classList.remove('hidden');
      finalScoreEl.style.display = 'block';
      finalScoreEl.textContent = 'PUNTAJE FINAL: ' + score;
      startBtn.textContent = 'REINTENTAR';
    }, 900);
  }

  startBtn.addEventListener('click', startGame);
})();
</script>
</body>
</html>
